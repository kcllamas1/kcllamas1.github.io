<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Story Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background-color: #faf8f5;
      color: #222222;
      line-height: 1.6;
    }

    main {
      max-width: 500px;
      margin: 4rem auto;
      padding: 2rem 1.5rem;
    }

    h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      font-weight: 400;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #c0784a;
      margin-bottom: 2rem;
    }

    label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
    }

    input[type="text"] {
      margin-top: 6px;
      padding: 8px 10px;
      width: 60%;
      display: block;
      border: 1px solid #e2ddd6;
      background-color: #faf8f5;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #222;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #c0784a;
    }

    fieldset {
      border: 0;
      margin-top: 1.5rem;
    }

    legend {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 6px;
    }

    .radio-group {
      display: flex;
      gap: 1.5rem;
      margin-top: 6px;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: none;
      letter-spacing: 0;
      font-size: 0.95rem;
      color: #222;
      cursor: pointer;
    }

    input[type="radio"] {
      accent-color: #c0784a;
    }

    .generate {
      margin-top: 1.5rem;
      padding: 10px 24px;
      background: none;
      border: 1px solid #222;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #222;
      cursor: pointer;
      border-radius: 4px;
      transition: background-color 0.2s, color 0.2s, border-color 0.2s;
    }

    .generate:hover {
      background-color: #c0784a;
      border-color: #c0784a;
      color: #fff;
    }

    .story {
      margin-top: 2rem;
      background: #fff;
      border: 1px solid #e2ddd6;
      border-left: 3px solid #c0784a;
      padding: 1.25rem 1.5rem;
      font-size: 1rem;
      font-weight: 300;
      color: #555;
      line-height: 1.75;
      visibility: hidden;
      border-radius: 4px;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      padding: 2rem;
      font-size: 0.8rem;
      color: #bbb;
      border-top: 1px solid #e2ddd6;
    }
  </style>
</head>
<body>
  <main>
    <p class="subtitle">Random Story Generator</p>
    <h1>Tell me a story.</h1>

    <div>
      <label for="custom-name">Enter custom name</label>
      <input id="custom-name" type="text" placeholder="e.g. Bob" />
    </div>

    <fieldset>
      <legend>Choose locale</legend>
      <div class="radio-group">
        <label><input id="us" type="radio" name="uk-us" value="us" checked /> US</label>
        <label><input id="uk" type="radio" name="uk-us" value="uk" /> UK</label>
      </div>
    </fieldset>

    <button class="generate">Generate random story</button>

    <!-- Thanks a lot to Willy Aguirre for his help with the code for this assessment -->
    <p class="story"></p>
  </main>

  <footer>story generator</footer>

  <script>
    const customName = document.getElementById("custom-name");
    const generateBtn = document.querySelector(".generate");
    const story = document.querySelector(".story");

    function randomValueFromArray(array) {
      const random = Math.floor(Math.random() * array.length);
      return array[random];
    }

    const characters = ["Justin the Beiber", "John Jr", "Jerry Tom"];
    const places = ["the 7-Elevent", "the Rec Center", "McDonalds"];
    const events = [
      "turned into confetti",
      "morphed into a shadow",
      "converted into a fly and buzzed away",
    ];

    function returnRandomStoryString() {
      const randomCharacter = randomValueFromArray(characters);
      const randomPlace = randomValueFromArray(places);
      const randomEvent = randomValueFromArray(events);
      let storyText = `It was 2am when ${randomCharacter} received a mysterious letter. 
      The letter said to meet someone at ${randomPlace} before sunrise, so they put on 
      their boots and headed out into the dark. When they finally arrived to the meetup location, they waited 
      for a few minutes, heard a strange noise behind them, and then ${randomEvent}. 
      Sandra found the boots the next morning and asked no questions, ${randomCharacter} 
      weighs 300 pounds, and the boots alone were worth investigating.`;

      return storyText;
    }

    generateBtn.addEventListener("click", generateStory);

    function generateStory() {
      let newStory = returnRandomStoryString();
      if (customName.value !== "") {
        const name = customName.value;
        newStory = newStory.replace("Bob", name);
      }
      if (document.getElementById("uk").checked) {
        const weight = `${Math.round(300 / 14)} stone`;
        const temperature = `${Math.round((94 - 32) * (5 / 9))} Celsius`;
        newStory = newStory.replace("300 pounds", weight);
        newStory = newStory.replace("94 Fahrenheit", temperature);
      }
      story.textContent = newStory;
      story.style.visibility = "visible";
    }
  </script>
</body>
</html>
